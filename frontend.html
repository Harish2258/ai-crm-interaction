<!DOCTYPE html>
<html>
<head>
    <title>AI CRM Frontend</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 40px;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 500px;
            margin: auto;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        h2 {
            margin-bottom: 10px;
        }

        .subtext {
            font-size: 13px;
            color: #666;
            margin-bottom: 15px;
        }

        textarea {
            width: 100%;
            height: 100px;
            margin-bottom: 15px;
            padding: 10px;
            font-size: 14px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #0056b3;
        }

        button:disabled {
            background: #999;
            cursor: not-allowed;
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 5px;
        }

        .field {
            margin-bottom: 8px;
            font-size: 15px;
        }

        .label {
            font-weight: bold;
        }

        .error {
            color: red;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>AI CRM Interaction</h2>

    <div class="subtext">
        AI-powered interaction logging using natural language
    </div>

    <textarea 
        id="inputText" 
        placeholder="Example: Met Dr Mehta and discussed aspirin">
    </textarea>

    <button id="submitBtn" onclick="sendData()">Submit</button>

    <div id="result"></div>

</div>

<script>
async function sendData() {

    const text = document.getElementById("inputText").value;
    const resultDiv = document.getElementById("result");
    const button = document.getElementById("submitBtn");

    if (!text.trim()) {
        alert("Please enter interaction text");
        return;
    }

    button.innerText = "Processing...";
    button.disabled = true;

    resultDiv.innerHTML = "Processing...";

    try {
        const response = await fetch("http://127.0.0.1:8000/interaction/log", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ text: text })
        });

        const data = await response.json();

        const result = data.data ? data.data : data;

        resultDiv.innerHTML = `
            <div class="field">Doctor: ${result.hcp_name}</div>
            <div class="field">Drug: ${result.drug}</div>
            <div class="field">Notes: ${result.notes}</div>
            <div class="field">Sentiment: ${result.sentiment}</div>
        `;

    } catch (error) {
        resultDiv.innerHTML = `<div class="error">Error connecting to server</div>`;
        console.error(error);
    }

    button.innerText = "Submit";
    button.disabled = false;
}
</script>

</body>
</html>
